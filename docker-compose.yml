services:
  backend:
    build:
      context: ./api-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
      - DEBUG=false
      - CORS_ORIGINS=["*"]
    volumes:
      - ./api-backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    restart: unless-stopped
