services:
  backend:
    build:
      context: ./api-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/app/data
      - DEBUG=false
      - CORS_ORIGINS=["*"]
    volumes:
      - ./api-backend/data:/app/data
    restart: unless-stopped

